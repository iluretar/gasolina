name: scrape-and-deploy

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm install

      - name: Run scraper
        run: npm run scrape

      - name: Upload data.json
        uses: actions/upload-artifact@v4
        with:
          name: data-json
          path: dashboard/static/data.json

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/static/data.json
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "chore(data): refresh from scraper"
            git push
          fi

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        working-directory: dashboard
        run: npm install

      - name: Download data.json
        uses: actions/download-artifact@v4
        with:
          name: data-json
          path: ./_data

      - name: Place data.json
        working-directory: dashboard
        run: cp ../_data/dashboard/static/data.json static/data.json

      - name: Build
        working-directory: dashboard
        env:
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
